<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Check Majority</h1>

    <main>
        <label for="birth">Type the year of birth</label><br>
        <input type="number" id="birth">
        <button onclick="check()">Verify</button>
    </main>

    <h2 id="result"></h2>
    <h3 id="age"></h3>

    <div id="v1">
        <h3>Alegria</h3>
        <img width="400" height="auto" src="../images/feliz.avif" alt="Imagem feliz">
    </div>

    <div id="v2">
        <h3>Tristeza</h3>
        <img width="400" height="auto" src="../images/triste.avif" alt="Imagem triste">
    </div>

    <script src="script.js"></script>
</body>
</html>
